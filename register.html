<head>
  <meta charset="UTF-8" />

  <meta name="description" content="Đăng ký khóa học Data · AI · ML tại TalentNode. Tư vấn lộ trình cá nhân hóa và ưu đãi học phí." />

  <meta property="og:url" content="https://sophie-nguyenthuthuy.github.io/talentnode/register.html" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Đăng ký — TalentNode" />
  <meta name="twitter:description" content="Đăng ký khóa học Data · AI · ML tại TalentNode. Tư vấn lộ trình cá nhân hóa và ưu đãi học phí." />
  <meta name="twitter:image" content="https://sophie-nguyenthuthuy.github.io/talentnode/assets/og-cover.png" />
  <meta name="theme-color" content="#0b0f1a" />
  <meta name="color-scheme" content="dark light" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div id="site-nav"></div>

  <section class="page-head">
    <div class="container">
      <span class="pill" data-i18n="regPage.pill">📝 Ghi danh</span>
      <h1><span data-i18n="regPage.h1a">Đăng ký</span> <span class="g" data-i18n="regPage.h1b">khóa học</span></h1>
      <p data-i18n="regPage.p">Điền thông tin bên dưới, đội ngũ tư vấn sẽ liên hệ để chốt lộ trình và ưu đãi học phí.</p>
    </div>
  </section>

  <section style="padding-top:20px;">
    <div class="container">
      <div class="form-wrap">
        <div class="form-success" data-i18n="reg.success">🎉 Đăng ký thành công! Tư vấn viên sẽ gọi cho bạn trong 24 giờ tới.</div>
        <form data-demo data-endpoint="https://script.google.com/macros/s/AKfycbxj7GpttU_wzXP_D9bUbsXwJ3I3AqijtLgG0qK2XT9yre3i-K6DKd4Hg3GmAaIP2Gof/exec">
          <input type="hidden" name="_source" value="register" />
          <div class="field-row">
            <div class="field"><label data-i18n="reg.name">Họ và tên</label><input type="text" name="name" required /></div>
            <div class="field"><label data-i18n="reg.email">Email</label><input type="email" name="email" required /></div>
          </div>
          <div class="field-row">
            <div class="field"><label data-i18n="reg.phone">Số điện thoại</label><input type="tel" name="phone" required /></div>
            <div class="field"><label data-i18n="reg.course">Khóa học quan tâm</label>
              <select name="course" required>
                <option value="" data-i18n="reg.coursePick">— Chọn khóa học —</option>
                <option data-i18n="course.de.t">Data Engineering Zero → Hero</option>
                <option data-i18n="course.ml.t">Machine Learning thực chiến</option>
                <option data-i18n="course.ai.t">AI Engineer: LLM & RAG</option>
                <option data-i18n="course.ds.t">Data Science nền tảng</option>
                <option data-i18n="course.mlops.t">MLOps & Deployment</option>
                <option data-i18n="course.dl.t">Deep Learning với PyTorch</option>
              </select>
            </div>
          </div>
          <div class="field-row">
            <div class="field"><label data-i18n="reg.level">Trình độ hiện tại</label>
              <select name="level" required>
                <option value="" data-i18n="reg.levelPick">— Chọn trình độ —</option>
                <option data-i18n="reg.lvl1">Mới bắt đầu, chưa biết lập trình</option>
                <option data-i18n="reg.lvl2">Biết cơ bản Python/SQL</option>
                <option data-i18n="reg.lvl3">Đã đi làm, muốn nâng cao</option>
              </select>
            </div>
            <div class="field"><label data-i18n="reg.mode">Hình thức học</label>
              <select name="mode">
                <option data-i18n="reg.online">Online</option>
                <option data-i18n="reg.offline">Tại trung tâm (Hà Nội)</option>
              </select>
            </div>
          </div>
          <div class="field"><label data-i18n="reg.goal">Mục tiêu của bạn</label><textarea rows="4" name="goal" data-i18n-ph="reg.goalPh" placeholder="VD: chuyển ngành sang Data Engineer trong 6 tháng..."></textarea></div>
          <button type="submit" class="btn btn-primary" data-i18n="reg.submit">Gửi đăng ký</button>
          <p class="form-note" data-i18n="reg.note">Bằng việc đăng ký, bạn đồng ý để TalentNode liên hệ tư vấn. Không spam.</p>
        </form>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="assets/script.js"></script>
</body>
</html>
